<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Nuevo Empleado</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header">

                    <h3>Nuevo Empleado</h3>

                </div>

                <div class="card-body">

                    <form action="{{ url_for('guardar_empleado') }}"
                        method="POST">

                        <div class="mb-3">

                            <label>Nombre</label>

                            <input
                                type="text"
                                class="form-control"
                                name="nombre"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Puesto</label>

                            <input
                                type="text"
                                class="form-control"
                                name="puesto"
                                required>

                        </div>

                        <button
                            class="btn btn-primary">

                            Guardar

                        </button>

                        <a href="{{ url_for('empleados') }}"
                            class="btn btn-secondary">

                            Cancelar

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
