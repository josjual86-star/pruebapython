<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Editar Producto</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header">

<h3>Editar Producto</h3>

</div>

<div class="card-body">

<form action="{{ url_for('actualizar_producto', id=producto.id) }}"
method="POST">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
value="{{ producto.nombre }}"
required>

</div>

<div class="mb-3">

<label>Precio</label>

<input
type="number"
step="0.01"
name="precio"
class="form-control"
value="{{ producto.precio }}"
required>

</div>

<button class="btn btn-primary">

Guardar Cambios

</button>

<a href="{{ url_for('productos') }}"
class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
